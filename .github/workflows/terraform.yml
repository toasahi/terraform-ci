name: Terraform Plan

on:
  pull_request:
    branches:
      - main
      - staging
      - develop
    types: [opened, synchronize]

jobs:
  determine-environment:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
    steps:
      - name: Determine environment
        id: set-env
        run: |
          if [[ "${{ github.base_ref }}" == "main" ]]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
          elif [[ "${{ github.base_ref }}" == "staging" ]]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
          elif [[ "${{ github.base_ref }}" == "develop" ]]; then
            echo "environment=development" >> $GITHUB_OUTPUT
          fi
  plan:
    needs: determine-environment
    runs-on: ubuntu-latest
    environment: ${{ needs.determine-environment.outputs.environment }}

    # Add permissions for OIDC
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      issues: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ap-northeast-1
      
      - name: tfcmt install
        run: |
          # Download tfcmt for Linux x64
          gh release download -R suzuki-shunsuke/tfcmt v4.14.0 -p tfcmt_linux_amd64.tar.gz
          
          # Verify the downloaded file
          gh attestation verify tfcmt_linux_amd64.tar.gz -R suzuki-shunsuke/tfcmt --signer-workflow suzuki-shunsuke/go-release-workflow/.github/workflows/release.yaml
          
          # Extract and install
          tar -xzf tfcmt_linux_amd64.tar.gz
          chmod +x tfcmt
          sudo mv tfcmt /usr/local/bin/
          
          # Verify installation
          tfcmt --version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.12.2

      - name: Terraform Init
        run: terraform init -reconfigure

      - name: Terraform Plan (with output file)
        run: |
          terraform plan -out=tfplan
          tfcmt plan --patch -- terraform show -no-color tfplan
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ github.event.pull_request.number }}-${{ needs.determine-environment.outputs.environment }}
          path: |
            tfplan
            .terraform.lock.hcl
          retention-days: 5
          # Overwrite existing artifact if it exists
          overwrite: true
    
    
  apply:
    needs: [plan, determine-environment]
    runs-on: ubuntu-latest
    environment: ${{ needs.determine-environment.outputs.environment }}_apply

    # Add permissions for OIDC
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      issues: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Terraform Plan
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan-${{ github.event.pull_request.number }}-${{ needs.determine-environment.outputs.environment }}
          path: ./

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ap-northeast-1
      
      - name: tfcmt install
        run: |
          # Download tfcmt for Linux x64
          gh release download -R suzuki-shunsuke/tfcmt v4.14.0 -p tfcmt_linux_amd64.tar.gz
          
          # Verify the downloaded file
          gh attestation verify tfcmt_linux_amd64.tar.gz -R suzuki-shunsuke/tfcmt --signer-workflow suzuki-shunsuke/go-release-workflow/.github/workflows/release.yaml
          
          # Extract and install
          tar -xzf tfcmt_linux_amd64.tar.gz
          chmod +x tfcmt
          sudo mv tfcmt /usr/local/bin/
          
          # Verify installation
          tfcmt --version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.12.2

      - name: Terraform Init
        run: terraform init -reconfigure

      - name: Verify Plan File
        run: |
          if [ ! -f "tfplan" ]; then
            echo "Error: Plan file not found!"
            exit 1
          fi
          echo "Plan file found, proceeding with apply..."

      - name: Terraform Apply
        run: tfcmt apply -- terraform apply tfplan
        env:
          GITHUB_TOKEN: ${{ github.token }}