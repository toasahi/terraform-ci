name: Terraform Workflow (Reusable)

on:
  workflow_call:
    inputs:
      environment:
        description: 'Environment name'
        required: true
        type: string
      pr_number:
        description: 'Pull request number (for artifact naming)'
        required: false
        type: string
        default: ''
      trigger_ref:
        description: 'Git reference that triggered the workflow'
        required: false
        type: string
        default: ''
      is_apply:
        description: 'Whether to run apply after plan (true for PR merge, false for PR open/sync)'
        required: false
        type: boolean
        default: false

jobs:
  plan:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    # Add permissions for OIDC
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      issues: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.trigger_ref }}
    
      - name: debug
        run: |
            echo "${{ vars.AWS_ROLE_ARN}}"
            echo "${{ inputs.environment}}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ap-northeast-1
      
      - name: tfcmt install
        run: |
          # Download tfcmt for Linux x64
          gh release download -R suzuki-shunsuke/tfcmt v4.14.0 -p tfcmt_linux_amd64.tar.gz
          
          # Verify the downloaded file
          gh attestation verify tfcmt_linux_amd64.tar.gz -R suzuki-shunsuke/tfcmt --signer-workflow suzuki-shunsuke/go-release-workflow/.github/workflows/release.yaml
          
          # Extract and install
          tar -xzf tfcmt_linux_amd64.tar.gz
          chmod +x tfcmt
          sudo mv tfcmt /usr/local/bin/
          
          # Verify installation
          tfcmt --version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.12.2

      - name: Terraform Init
        run: |
            cd environments/${{ inputs.environment }}
            terraform init -reconfigure

      - name: Terraform Plan
        run: |
          cd environments/${{ inputs.environment }}
          terraform plan -out=tfplan
          tfcmt plan --patch -- terraform show -no-color tfplan
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ inputs.pr_number }}-${{ inputs.environment }}
          path: |
            environments/${{ inputs.environment }}/tfplan
            environments/${{ inputs.environment }}/.terraform.lock.hcl
          retention-days: 5
          # Overwrite existing artifact if it exists
          overwrite: true

  apply:
    needs: plan
    if: inputs.is_apply == true
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}_apply

    # Add permissions for OIDC
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      issues: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.trigger_ref }}

      - name: Download Terraform Plan
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan-${{ inputs.pr_number }}-${{ inputs.environment }}
          path: ./environments/${{ inputs.environment }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ap-northeast-1
      
      - name: tfcmt install
        run: |
          # Download tfcmt for Linux x64
          gh release download -R suzuki-shunsuke/tfcmt v4.14.0 -p tfcmt_linux_amd64.tar.gz
          
          # Verify the downloaded file
          gh attestation verify tfcmt_linux_amd64.tar.gz -R suzuki-shunsuke/tfcmt --signer-workflow suzuki-shunsuke/go-release-workflow/.github/workflows/release.yaml
          
          # Extract and install
          tar -xzf tfcmt_linux_amd64.tar.gz
          chmod +x tfcmt
          sudo mv tfcmt /usr/local/bin/
          
          # Verify installation
          tfcmt --version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.12.2

      - name: Terraform Init
        run: |
            cd environments/${{ inputs.environment }}
            terraform init -reconfigure

      - name: Verify Plan File
        run: |
          if [ ! -f "tfplan" ]; then
            echo "Error: Plan file not found!"
            exit 1
          fi
          echo "Plan file found, proceeding with apply..."

      - name: Terraform Apply
        run: |
            cd environments/${{ inputs.environment }}
            tfcmt apply -- terraform apply tfplan
        env:
          GITHUB_TOKEN: ${{ github.token }}